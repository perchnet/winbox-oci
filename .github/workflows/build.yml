name: Build and Push Image to GHCR

on:
  push:
    branches:
      - main
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LATEST_VERSION: 44

concurrency: ${{ github.repository }}_${{ github.ref_name }}
jobs:
  build-and-push-image:
    strategy:
      matrix:
        base-version:
          - 43
          - 44
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.base-version }}
            ${{ matrix.base-version == env.LATEST_VERSION && format('ghcr.io/{0}:{1}', github.repository, 'latest') || '' }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/buildcache:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/buildcache:buildcache,mode=max
          build-args: |
            BASE_VERSION=${{ matrix.base-version }}
